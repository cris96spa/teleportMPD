# Static-Teleport (S-T) PPO curriculum on FrozenLake.
# tau decreases linearly to 0 over the run (thesis Algorithm 2 / Theorem 5.2);
# the per-update budget eps_tau is derived from total_timesteps / n_steps at runtime.
name: frozen_lake_st_ppo
gamma: 0.99
total_timesteps: 100000
seed: 42
n_runs: 1

algorithm:
  kind: ppo
  n_steps: 2048
  batch_size: 64
  n_epochs: 10
  gae_lambda: 0.95
  learning_rate: 0.0003
  clip_range: 0.2
  ent_coef: 0.0
  vf_coef: 0.5

env:
  map_name: "8x8"
  is_slippery: false
  n_bins: 0

teleport:
  tau_0: 0.9
  distribution: uniform_nonterminal
  discount_tau: true

curriculum:
  kind: static
