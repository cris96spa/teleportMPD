# Dynamic-Teleport (D-T) PPO curriculum on FrozenLake.
# tau is reduced based on the policy shift each update (thesis Algorithm 3):
# eps is the total state-visit shift budget, eps_tau_max caps a single model update.
name: frozen_lake_dt_ppo
gamma: 0.99
total_timesteps: 100000
eval_freq: 5000 # real-MDP eval every 5k steps -> ~20 eval/mean_reward points in MLflow
seed: 42
n_runs: 1

algorithm:
  kind: ppo
  n_steps: 2048
  batch_size: 64
  n_epochs: 10
  gae_lambda: 0.95
  learning_rate: 0.0003
  clip_range: 0.2
  ent_coef: 0.0
  vf_coef: 0.5

env:
  map_name: "8x8"
  is_slippery: false
  n_bins: 0

teleport:
  tau_0: 0.9
  distribution: uniform_nonterminal

# eps_tau = eps - gamma/(1-gamma)*D_inf lowers tau each update; at gamma=0.99 the
# gamma/(1-gamma)=99 factor means the policy shift consumes ~99*D_inf, so eps must be
# O(10-100), not O(1), or tau never anneals at all. eps=80 keeps the gate open for a
# policy shift up to eps*(1-gamma)/gamma ~= 0.8; eps_tau_max=4 caps the per-update step
# so tau_0=0.9 can still reach 0 over the run.
curriculum:
  kind: dynamic
  eps: 80.0
  eps_tau_max: 4.0
