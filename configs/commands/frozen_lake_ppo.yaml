# Vanilla PPO baseline on FrozenLake (no teleport curriculum).
name: frozen_lake_ppo_vanilla
gamma: 0.99
total_timesteps: 200000
eval_freq: 10000 # real-MDP eval every 10k steps -> ~20 eval/mean_reward points in MLflow
seed: 42
n_runs: 1

algorithm:
  kind: ppo
  n_steps: 2048
  batch_size: 64
  n_epochs: 10
  gae_lambda: 0.95
  learning_rate: 0.0003
  clip_range: 0.2
  ent_coef: 0.0
  vf_coef: 0.5

env:
  map_name: "8x8"
  is_slippery: false
  n_bins: 0

teleport:
  tau_0: 0.0
  distribution: uniform_nonterminal

curriculum:
  kind: none
