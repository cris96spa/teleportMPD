# Teleport Model Policy Iteration (TMPI) on FrozenLake.
# TMPI is exact and model-based; it schedules its own teleport rate via the Teleport
# Bound, so the curriculum must be 'none'. gamma is the standard 0.99. The exact bound
# anneals tau conservatively — it improves the policy at the current tau and only lowers
# tau once that stops paying off — so on a small map like this 8x8 tau can hold at tau_0
# while the policy converges; it anneals on larger maps. Lowering gamma neither helps it
# anneal nor improves J.
name: frozen_lake_tmpi
gamma: 0.99
seed: 42
n_runs: 1

algorithm:
  kind: tmpi
  threshold: 1.0e-9
  max_iterations: 300000
  temperature: 0.1

env:
  size: 8
  is_slippery: false

teleport:
  tau_0: 0.4
  distribution: uniform_nonterminal

curriculum:
  kind: none
