version: "3.12"

services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.14.0-full
    container_name: mlflow_server
    restart: unless-stopped
    ports:
      - "5002:5002"
    volumes:
      - ./mlflow:/mlflow:rw

    command: >
      mlflow server
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --host 0.0.0.0
      --port 5002
      --serve-artifacts
      --artifacts-destination /mlflow/artifacts
